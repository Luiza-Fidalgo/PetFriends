server:
  port: 8081   # Almoxarifado roda na porta 8081

spring:
  application:
    name: PetFriends_Almoxarifado

  # Banco em memoria H2 (zera toda vez que reinicia)
  datasource:
    url: jdbc:h2:mem:almoxarifado
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update   # cria as tabelas sozinho
    show-sql: false
  h2:
    console:
      enabled: true      # painel do banco em http://localhost:8081/h2-console

  # Conexao com o RabbitMQ (subido pelo docker compose)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
